<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>To-Do</title>
</head>

<body>
    <h1>Register</h1>
    <form method="POST" th:action="@{/register}">
        <h3>Username:</h3>
        <input type="text" name="username"/>
        <br/>
        <h3>Password:</h3>
        <input type="password" name="password"/>
        <br/>
        <input type="submit" value="Register"/>
    </form>
</body>
</html>
